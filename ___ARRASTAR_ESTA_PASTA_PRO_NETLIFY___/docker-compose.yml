version: '3.8'

services:
  db:
    image: postgres:15
    container_name: bolao_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bolao
    ports:
      - "5432:5432"
    volumes:
      - bolao_pgdata:/var/lib/postgresql/data

volumes:
  bolao_pgdata:
